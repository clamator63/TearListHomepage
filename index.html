<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Things that brought tears to my eyes</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        text-align: center;
        transition: background 0.3s, color 0.3s;
    }

    .light-mode {
        background: #f4f4f4;
        color: #222;
    }

    h1 {
        margin-bottom: 10px;
    }

    #modeToggle {
        margin-bottom: 20px;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        background: #4a90e2;
        color: white;
        cursor: pointer;
        font-weight: bold;
    }

    #modeToggle:hover {
        background: #357ac9;
    }

    #counter {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 20px;
    }

    .scroll-list {
        width: 90%;
        max-width: 500px;
        margin: 0 auto;
        padding: 10px;
    }

    .card {
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        opacity: 0;
        transform: translateY(10px);
        animation: fadeIn 0.5s forwards;
    }

    .light-mode .card {
        background: #fff;
        border-color: #ccc;
    }

    .date {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
    }

    @keyframes fadeIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>
<body>

<h1>Things that brought tears to my eyes</h1>

<button id="modeToggle" onclick="toggleMode()">Byt tema</button>

<div id="counter">Laddar besöksräknare...</div>

<div class="scroll-list" id="myList"></div>

<script>
// -----------------------------
// 1. Ladda lista från list.json
// -----------------------------
async function loadList() {
    try {
        const response = await fetch("list.json");
        const data = await response.json();

        const list = document.getElementById("myList");
        list.innerHTML = "";

        data.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.style.animationDelay = (index * 0.08) + "s";

            const text = document.createElement("div");
            text.textContent = item.text;

            const date = document.createElement("div");
            date.className = "date";
            date.textContent = item.date;

            card.appendChild(text);
            card.appendChild(date);
            list.appendChild(card);
        });
    } catch (e) {
        console.error("Kunde inte ladda listan:", e);
    }
}

// -----------------------------
// 2. Besöksräknare
// -----------------------------
function updateCounter() {
    let count = localStorage.getItem("visits");
    count = count ? Number(count) + 1 : 1;
    localStorage.setItem("visits", count);
    document.getElementById("counter").textContent = "Besökare: " + count;
}

// -----------------------------
// 3. Ljus/Dark mode
// -----------------------------
function toggleMode() {
    document.body.classList.toggle("light-mode");
    localStorage.setItem("theme", 
        document.body.classList.contains("light-mode") ? "light" : "dark"
    );
}

function loadTheme() {
    const saved = localStorage.getItem("theme");
    if (saved === "light") {
        document.body.classList.add("light-mode");
    }
}

// -----------------------------
// Initiera sidan
// -----------------------------
loadTheme();
loadList();
updateCounter();
</script>

</body>
</html>
