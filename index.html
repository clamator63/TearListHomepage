<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Hello world</title>
	<style>
		.scroll-list {
			width: 300px;
			height: 200px;
			border: 1px solid #ccc;
			padding: 10px;
			overflow-y: scroll;
			background: #f9f9f9;
		}

		.scroll-list ul {
			margin: 0;
			padding: 0;
			list-style: none;
		}

		.scroll-list li {
			padding: 5px 0;
			border-bottom: 1px solid #ddd;
		}
	</style>
</head>
<body>
<body>
    <h1>Hello world</h1>

    <h2>Min scroll-lista</h2>

    <div class="scroll-list">
        <ul>
            <li>Första raden</li>
            <li>Andra raden</li>
            <li>Tredje raden</li>
        </ul>
    </div>
</body>
</body>
</html>
