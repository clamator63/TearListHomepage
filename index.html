<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Hello world</title>
	<style>
		.scroll-list {
			width: 300px;
			height: 200px;
			border: 1px solid #ccc;
			padding: 10px;
			overflow-y: scroll;
			background: #f9f9f9;
		}

		.scroll-list ul {
			margin: 0;
			padding: 0;
			list-style: none;
		}

		.scroll-list li {
			padding: 5px 0;
			border-bottom: 1px solid #ddd;
		}
	</style>
</head>
<body>
    <h1>Hello world</h1>

    <h2>Min scroll-lista</h2>

 <h2>Min scroll-lista</h2>

<div class="scroll-list">
    <div class="scroll-list">
    <ul id="myList"></ul>
</div>

</div>

<!-- Formulär för att lägga till nya rader -->
<div style="margin-top: 20px;">
    <input type="text" id="newItem" placeholder="Skriv ny rad här">
    <button onclick="addItem()">Lägg till rad</button>
</div>

<script>
function addItem() {
    const text = document.getElementById("newItem").value;
    if (text.trim() === "") return;

    const li = document.createElement("li");
    li.textContent = text;

    document.getElementById("myList").appendChild(li);
    document.getElementById("newItem").value = "";
}
</script>
<script>
async function loadList() {
    const response = await fetch('list.json');
    const items = await response.json();

    const list = document.getElementById('myList');
    list.innerHTML = '';

    items.forEach(text => {
        const li = document.createElement('li');
        li.textContent = text;
        list.appendChild(li);
    });
}

loadList();
</script>
</body>
</html>
