<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Min Lista</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #121212;
        color: #e0e0e0;
        margin: 0;
        padding: 20px;
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
        color: #fff;
    }

    #counter {
        font-size: 14px;
        color: #aaa;
        margin-bottom: 20px;
    }

    .scroll-list {
        width: 90%;
        max-width: 500px;
        height: 300px;
        margin: 0 auto;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 6px;
        overflow-y: auto;
        padding: 10px;
        text-align: left;
    }

    .list-item {
        padding: 6px 0;
        border-bottom: 1px solid #333;
    }
</style>
</head>
<body>

<h1>Min Scroll-lista</h1>
<div id="counter">Laddar besöksräknare...</div>

<div class="scroll-list">
    <ul id="myList"></ul>
</div>

<script>
// -----------------------------
// 1. Ladda lista från list.json
// -----------------------------
async function loadList() {
    try {
        const response = await fetch("list.json");
        const data = await response.json();

        const list = document.getElementById("myList");
        list.innerHTML = "";

        data.forEach(item => {
            const li = document.createElement("li");
            li.className = "list-item";
            li.textContent = item;
            list.appendChild(li);
        });
    } catch (e) {
        console.error("Kunde inte ladda listan:", e);
    }
}

// -----------------------------
// 2. Besöksräknare
// -----------------------------
function updateCounter() {
    let count = localStorage.getItem("visits");
    count = count ? Number(count) + 1 : 1;
    localStorage.setItem("visits", count);
    document.getElementById("counter").textContent = "Besökare: " + count;
}

// -----------------------------
// Initiera sidan
// -----------------------------
loadList();
updateCounter();
</script>

</body>
</html>
